<style>
/* ============================================================
   Revolut / QuantumLight playbook theme
   One accent (#2D64E3) on black · white · gray, Basier Circle,
   radius scale 7/10/15/20, black bands, blue "at a glance" cards
   ============================================================ */
:root{
  --ink:#111111; --gray:#6F7987; --faint:#B2B2B2; --hair:#E6E6E6; --canvas:#F4F4F4; --g0:#ECEEF1;
  --green1:#D9E2FB; --green2:#2D64E3; --green3:#1A3FA8;
  --orange1:#DCE1E8; --orange2:#6F7987; --orange3:#111111;
  --blue1:#D9E2FB; --blue2:#5E8BEE; --blue3:#1A3FA8;
  --violet1:#DFE6F9; --violet2:#7189B4; --violet3:#2D64E3;
  --teal1:#E1E4E8; --teal2:#2D64E3; --teal3:#111111;
  --indigo2:#5E8BEE; --indigo3:#23305B;
  --rough:#C2C8D2; --amber:#E8EEFC; --ambertx:#2D64E3;
  --okbg:#E4EBFB; --oktx:#2456CF; --ambg:#F4F4F4; --amtx:#6F7987; --redbg:#111111; --redtx:#111111;
  --impA:#2D64E3; --impB:#AFC6F5;
  --bg:#fff; --card:#fff; --hdrbg:rgba(0,0,0,.94); --btn-bg:#2D64E3; --btn-tx:#fff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{overscroll-behavior-y:contain;-webkit-tap-highlight-color:transparent}
button,.card,.dday,.ycell,.tsh{touch-action:manipulation}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:'Basier Circle',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:16px;line-height:1.5}
button{font-family:inherit;font-size:inherit;border:none;background:none;color:inherit;cursor:pointer;padding:0}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);background:var(--card)}
#app{max-width:640px;margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom))}
/* header — black nav band */
.hdr{position:sticky;top:0;background:var(--hdrbg);backdrop-filter:blur(8px);z-index:20;
  display:flex;align-items:center;gap:10px;margin:0 -16px;padding:13px 16px 11px;color:#fff}
.hdr .back{font-size:24px;line-height:1;padding:4px 10px 6px 0;color:rgba(255,255,255,.7)}
.hdr .wm{font-size:16px;margin:0;flex:1;font-weight:600;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.saved{font-size:12px;color:rgba(255,255,255,.72);opacity:0;transition:opacity .4s}
.saved.show{opacity:1}
.menu-btn{font-size:22px;padding:10px 12px;color:rgba(255,255,255,.85)}
.hdr .editlbl{color:rgba(255,255,255,.55)}
.menu{position:absolute;right:16px;top:52px;background:var(--card);color:var(--ink);border:1px solid var(--hair);border-radius:15px;
  box-shadow:0 12px 40px rgba(0,0,0,.16);overflow:hidden;min-width:230px}
.menu button{display:block;width:100%;text-align:left;padding:13px 16px;font-size:15px}
.menu button:active{background:var(--canvas)}
.menu .danger{color:var(--redtx);font-weight:600}
/* page title block */
.pgh{margin:24px 0 0}
.pgh h1{font-size:31px;font-weight:700;line-height:1.11;margin:0;letter-spacing:0}
.pgh .rt{display:inline-block;margin-top:12px;background:var(--canvas);color:#969696;font-size:12.5px;padding:5px 12px;border-radius:10px}
.pgh.home{background:#000;margin:0 -16px;padding:2px 16px 30px;color:#fff}
.pgh.home h1{font-size:32px}
.pgh.home p{margin:8px 0 0;color:rgba(255,255,255,.64);font-size:15px}
/* login — black hero */
#login{position:fixed;inset:0;background:#000;color:#fff;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:340px;text-align:center}
#lockimg{width:120px;height:120px;border-radius:20px;object-fit:cover;margin:0 auto 18px;display:none}
.login-card h2{margin:0 0 4px;font-size:24px;color:#fff}
.login-card p{color:rgba(255,255,255,.64);margin:0 0 22px;font-size:14px}
.login-card input{width:100%;padding:14px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;text-align:center;font-size:18px}
.login-card input::placeholder{color:rgba(255,255,255,.45)}
.login-card .go{width:100%;margin-top:12px;padding:14px;background:var(--btn-bg);color:var(--btn-tx);border-radius:10px;font-weight:600;font-size:16px}
.login-err{color:rgba(255,255,255,.88);font-size:14px;min-height:20px;margin-top:10px}
/* home hub — dark playbook index */
.hub{background:#000;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:8px 16px;margin-top:18px}
.cards{display:flex;flex-direction:column;gap:10px}
#app .hub .cards{gap:0}
.card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border:1px solid var(--hair);
  border-radius:10px;text-align:left;width:100%}
.card{transition:transform .09s ease}
.card:active{background:var(--canvas);transform:scale(.985)}
#app .hub .card{background:transparent;border:none;border-radius:12px;padding:15px 4px;color:#fff}
#app .hub .card+.card{border-top:1px solid rgba(255,255,255,.12);border-radius:0}
#app .hub .card:active{background:rgba(255,255,255,.06);transform:scale(.99)}
.cnum{width:32px;height:32px;border-radius:99px;background:rgba(255,255,255,.18);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card .t{flex:1}
.card .t b{display:block;font-size:16px;font-weight:600}
.card .t span{color:var(--gray);font-size:13px}
#app .hub .card .t b{color:#fff}
#app .hub .card .t span{color:rgba(255,255,255,.6)}
.card .v{font-weight:700;font-size:15px;text-align:right}
.card .v small{display:block;font-weight:400;color:var(--gray);font-size:11px}
#app .hub .card .v{color:#fff}
#app .hub .card .v small{color:rgba(255,255,255,.55)}
#app .hub .mvbtn{background:rgba(255,255,255,.14);color:#fff}
/* sections — playbook H2s with a blue tick */
.sec{margin-top:38px}
.sec h3{font-size:22px;font-weight:600;line-height:1.2;margin:0 0 10px;padding-bottom:0;border-bottom:none}
#app .sec h3::before{content:'';display:inline-block;width:16px;height:3px;border-radius:2px;background:var(--green2);margin-right:9px;vertical-align:6px}
.sub{color:var(--gray);font-size:13.5px;margin:6px 0 10px}
.hero{font-size:40px;font-weight:700;letter-spacing:0;line-height:1.05;margin:12px 0 2px}
.meter{height:8px;background:var(--g0);border-radius:99px;overflow:hidden;margin:10px 0 4px}
.meter i{display:block;height:100%;border-radius:99px}
.rowline{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0F2F4}
.rowline .lbl{flex:1;font-size:15px}
.rowline .lbl small{display:block;color:var(--gray);font-size:12px}
.rowline .val{font-weight:600;font-size:15px}
.rowline input.num{width:118px;text-align:right;padding:9px 10px;border:1px solid var(--hair);border-radius:7px;font-weight:600}
.chip{display:inline-block;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:700}
.chip.ok{background:var(--okbg);color:var(--oktx)} .chip.warn{background:var(--ambg);color:var(--amtx)} .chip.off{background:#111111;color:#fff}
.chip.na{background:var(--g0);color:var(--gray)}
.hbar{display:flex;align-items:center;gap:8px;padding:6px 0}
.hbar .n{width:96px;font-size:13px;color:var(--gray)}
.hbar .track{flex:1;height:10px;background:var(--g0);border-radius:99px;overflow:hidden}
.hbar .track i{display:block;height:100%;border-radius:99px}
.hbar .track.bullet{position:relative;overflow:visible}
.track.bullet b{position:absolute;left:0;top:0;bottom:0;background:var(--okbg);border-radius:99px}
.track.bullet i{position:absolute;left:0;top:2px;bottom:2px;height:auto;border-radius:99px}
.hbar .a{width:86px;text-align:right;font-size:13px;font-weight:600}
/* tables of editable rows */
.tbl .trow{display:grid;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid #F0F2F4}
.tbl input,.tbl select{padding:8px;border:1px solid var(--hair);border-radius:7px;width:100%;background:var(--card)}
.tbl .del{color:var(--faint);font-size:18px;padding:12px 10px}
.addbtn{margin-top:10px;padding:11px 16px;border:1px solid var(--hair);background:var(--canvas);border-radius:10px;color:var(--gray);font-size:14px;font-weight:600;width:100%}
/* month chips */
.mchips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;-webkit-overflow-scrolling:touch}
.mchips button{padding:11px 14px;border-radius:8px;background:var(--canvas);color:var(--gray);font-size:14px;font-weight:600;flex:0 0 auto}
.mchips button.on{background:var(--btn-bg);color:var(--btn-tx)}
/* daily grid */
.dgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-top:8px}
.dcell{aspect-ratio:1;border-radius:8px;background:var(--g0);display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:11px;color:var(--gray);position:relative;min-height:44px}
.dcell b{font-size:12px;color:var(--ink)}
.dcell.today{box-shadow:inset 0 0 0 2px var(--ambertx);background:var(--amber)}
.dcell.dead{background:transparent}
/* habit rows */
.hab{border:1px solid var(--hair);border-radius:15px;padding:15px;margin-top:16px}
.hab h4{margin:0;font-size:16px;font-weight:600}
.hab .todayrow{display:flex;gap:8px;align-items:center;margin:10px 0 4px}
.hab .todayrow span{flex:1;font-size:13px;color:var(--gray)}
.vbtn{width:46px;height:46px;border-radius:10px;font-weight:700;font-size:17px;background:var(--g0)}
.vbtn.v1.on{background:var(--rough)}
.vbtn.on{color:#fff}
.vbtn.v1.on{color:var(--ink)}
.clearbtn{font-size:12px;color:var(--faint);padding:6px}
.dstrip{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:5px;margin-top:10px}
.dday{border-radius:7px;background:var(--g0);display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--gray);min-height:40px}
.dday.today{box-shadow:inset 0 0 0 2px var(--ambertx);background:var(--amber)}
.dday.dead{background:transparent}
.ystrip{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:4px;margin-top:10px}
.ycell{border-radius:7px;background:var(--g0);text-align:center;padding:7px 1px;font-size:10px;color:var(--gray);white-space:nowrap;overflow:hidden;min-height:44px}
.stats{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.stats div{font-size:13px;color:var(--gray)} .stats b{color:var(--ink)}
/* timeline */
.tgrid{display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:5px;margin-top:8px}
.tcell{border-radius:7px;background:var(--canvas);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--faint);min-height:36px}
.tcell.lived{background:var(--g0);color:var(--ink)}
.tcell.now{background:var(--amber);color:var(--ambertx);font-weight:700}
.tcell.story{color:#fff;font-weight:700}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:12px}
.legend span{display:flex;align-items:center;gap:5px;color:var(--gray)}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block}
.mile{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #F0F2F4;align-items:flex-start;width:100%;text-align:left}
.mile .yr{font-weight:700;width:46px;font-size:14px}
.mile .ev{flex:1;font-size:14px}
.mile .ev small{display:block;color:var(--gray);font-size:12px;margin-top:2px}
/* editor drawer */
.drawer{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--hair);
  border-radius:20px 20px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.18);padding:18px 16px calc(18px + env(safe-area-inset-bottom));z-index:50;max-width:640px;margin:0 auto}
.drawer::before{content:'';display:block;width:42px;height:4px;border-radius:99px;background:var(--hair);margin:-6px auto 12px}
.drawer h4{margin:0 0 10px;font-size:17px;font-weight:600}
.drawer input[type=text],.drawer input[type=date],.drawer textarea,.drawer select{width:100%;padding:11px;border:1px solid var(--hair);border-radius:7px;margin-bottom:8px}
.drawer .row{display:flex;gap:8px}
.drawer .primary{flex:1;padding:13px;background:var(--btn-bg);color:var(--btn-tx);border-radius:10px;font-weight:700}
.drawer .ghost{padding:13px 16px;border-radius:10px;background:var(--canvas);color:var(--gray);font-weight:600}
.typechips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.typechips button{padding:7px 12px;border-radius:7px;background:var(--canvas);font-size:13px;font-weight:600;color:var(--gray)}
.typechips button.on{color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:40}
.note{font-size:12.5px;color:var(--gray);margin-top:10px;line-height:1.5}
.editlbl{font-size:13px;color:var(--faint);padding:10px 8px}
.chart{display:block;margin:8px 0 2px}
.fldl{font-size:11px;color:var(--gray);margin:2px 0 4px;display:block}
.todorow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F0F2F4}
.todorow .tbox{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--hair);background:var(--card);flex:0 0 auto;color:#fff;font-weight:800;font-size:14px}
.todorow.done .tbox{background:var(--green2);border-color:var(--green2)}
.todorow .txt{flex:1;font-size:15px}
.todorow.done .txt{color:var(--faint);text-decoration:line-through}
.ideacard{border:1px solid var(--hair);border-radius:15px;padding:13px 15px;margin-top:10px;cursor:pointer}
.ideacard h5{margin:0 0 4px;font-size:15px}
.ideacard p{margin:0;font-size:13.5px;color:var(--gray);line-height:1.55}
.ideachip{display:inline-block;padding:1px 8px;border-radius:7px;background:rgba(45,100,227,.10);color:#2D64E3;font-size:12.5px;font-weight:700}
.backl{font-size:11.5px;color:var(--faint);margin-top:6px}
.mvbtn{width:42px;height:42px;border-radius:10px;background:var(--canvas);font-size:17px;font-weight:700;color:var(--gray)}
.colorchip{width:36px;height:36px;border-radius:10px;flex:0 0 auto}
.colorchip.on{box-shadow:0 0 0 2.5px var(--card),0 0 0 4.5px var(--green2)}
.fontopt{display:block;width:100%;text-align:left;padding:12px 14px;border:1px solid var(--hair);border-radius:10px;margin-bottom:8px;background:var(--card)}
.fontopt.on{border-color:var(--green2);box-shadow:inset 0 0 0 1px var(--green2)}
.fontopt b{display:block;font-size:15px}
.fontopt span{font-size:13px;color:var(--gray)}
#mindsvg g[data-node]{transition:opacity .15s}
#mindsvg.focus g[data-node]{opacity:.3}
#mindsvg.focus g[data-node].adj{opacity:1}
#mindsvg line{transition:opacity .15s}
#mindsvg.focus line{opacity:.18}
#mindsvg.focus line.adj{opacity:1;stroke:#7189B4}
.impcard{border:1px solid var(--hair);border-radius:15px;padding:15px;margin-top:12px}
.impcard .head{display:flex;gap:8px;align-items:center}
.impcard input.nm{font-weight:700;border:none;padding:4px 0;flex:1;font-size:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.fld label{display:block;font-size:11px;color:var(--gray);margin:0 0 3px}
.fld input{width:100%;padding:8px;border:1px solid var(--hair);border-radius:7px}
.subtog{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:6px;margin-top:8px}
.sym-sev{display:flex;gap:6px}
.sym-sev button{flex:1;padding:10px;border-radius:8px;background:var(--canvas);font-weight:600;font-size:14px;color:var(--gray)}
.sym-sev button.on.Mild{background:var(--g0);color:var(--gray)}
.sym-sev button.on.Moderate{background:var(--ambg);color:var(--amtx)}
.sym-sev button.on.Severe{background:#111111;color:#fff}
.sym-item{padding:10px 0;border-bottom:1px solid #F0F2F4;display:flex;gap:10px;align-items:flex-start}
.sym-item .d{width:78px;font-size:12px;color:var(--gray)}
.sym-item .m{flex:1;font-size:14px}
.sym-item .m small{display:block;color:var(--gray);font-size:12px}
/* the blue "today at a glance" card */
.tstrip{background:#2D64E3;border:none;border-radius:20px;padding:20px 18px;margin:16px 0 6px;color:#fff}
.tstrip .tshead{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:10px}
.tsrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tsname{width:44px;font-size:13px;font-weight:700;color:#fff}
.tshabits{display:flex;gap:6px;flex:1;overflow-x:auto}
.tsh{min-width:64px;height:54px;padding:0 7px;border-radius:12px;background:rgba(255,255,255,.16);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex:0 0 auto}
.tsh span{font-size:9.5px;font-weight:600;color:inherit;opacity:.85;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsspend{display:flex;align-items:center;gap:8px;margin-top:12px}
.tsspend input{flex:1;min-width:0;padding:9px 10px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.12);color:#fff;border-radius:10px}
.tsspend input::placeholder{color:rgba(255,255,255,.55)}
.tsspend button{padding:9px 14px;background:#fff;color:#2D64E3;border-radius:10px;font-weight:700}
.tstodos{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.tstodo{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid rgba(255,255,255,.25);border-radius:10px;text-align:left;font-size:14px;background:rgba(255,255,255,.08);color:#fff}
.tstodo .qb{width:18px;height:18px;border-radius:6px;border:1.5px solid rgba(255,255,255,.55);flex:0 0 auto}
.tstodo.more{justify-content:center;color:rgba(255,255,255,.7);border-style:dashed}
.tsnow{font-size:12px;color:rgba(255,255,255,.75);white-space:nowrap}
.tstrip .stats div{color:rgba(255,255,255,.8)}
.tstrip .stats b{color:#fff}
.alldone-msg{color:#fff;font-weight:700;font-size:14px;margin:0 0 4px}
/* blue at-a-glance section cards */
#app .sec.glance{background:#2D64E3;border-radius:20px;padding:22px 18px 20px;color:#fff;
  --ink:#fff;--gray:rgba(255,255,255,.8);--faint:rgba(255,255,255,.6);--g0:rgba(255,255,255,.28);--hair:rgba(255,255,255,.3);
  --green2:#fff;--green3:#fff;--teal2:#fff;--indigo2:#fff;--impA:#fff;--impB:rgba(255,255,255,.55);--okbg:rgba(255,255,255,.22)}
#app .sec.glance h3{color:#fff}
#app .sec.glance h3::before{background:#fff}
#app .sec.glance .sub{color:rgba(255,255,255,.8)}
#app .sec.glance .note{color:rgba(255,255,255,.64)}
#app .sec.glance .rowline{border-color:rgba(255,255,255,.25)}
/* prev / next chapter pagination */
.pager{display:flex;justify-content:space-between;gap:10px;border-top:1px solid var(--hair);margin-top:46px;padding-top:18px}
.pgl{display:flex;align-items:center;gap:11px;text-align:left;color:var(--ink);max-width:48%}
.pgl.next{flex-direction:row-reverse;text-align:right;margin-left:auto}
.pgl .arr{width:36px;height:36px;border:1px solid var(--hair);border-radius:99px;display:flex;align-items:center;justify-content:center;color:var(--ink);flex:0 0 auto;font-size:15px}
.pgl small{display:block;color:#969696;font-size:12px}
.pgl b{font-size:14px;font-weight:600}
@media(min-width:520px){ .dstrip{grid-template-columns:repeat(16,minmax(0,1fr))} .tcell{min-height:40px} }
body.dark{--bg:#000000;--card:#101114;--canvas:#17181C;--g0:#1F2126;--hair:#26282E;--ink:#F2F4F7;--gray:#A5B0BB;--faint:#6F7987;--hdrbg:rgba(0,0,0,.92);--btn-bg:#2D64E3;--btn-tx:#fff;
  --green1:#16264D;--green2:#2D64E3;--green3:#8FB0F5;
  --violet1:#1C2740;--violet2:#7189B4;--violet3:#8FB0F5;
  --teal1:#20242B;--teal2:#3D74F0;--teal3:#F2F4F7;
  --blue1:#16264D;--blue2:#5E8BEE;--blue3:#8FB0F5;
  --indigo2:#5E8BEE;--indigo3:#8FB0F5;
  --orange1:#23262C;--orange2:#A5B0BB;--orange3:#F2F4F7;
  --rough:#3A414B;--amber:#152449;--ambertx:#7DA2F5;
  --okbg:#152449;--oktx:#8FB0F5;--ambg:#20242B;--amtx:#A5B0BB;--redtx:#F2F4F7;--redbg:#F2F4F7;
  --impA:#5E8BEE;--impB:#2A3D6B}
body.hn{--bg:#F5F5F5;--card:#FFFFFF;--canvas:#ECECEC;--g0:#E4E5E8;--hair:#DDDEE1;--ink:#111111;--gray:#6F7987;--faint:#A6ADB6;--hdrbg:rgba(0,0,0,.94);--btn-bg:#111111;--btn-tx:#fff;--amber:#E3EAFA;--ambertx:#2456CF}
body.hn .card,body.hn .hab,body.hn .impcard,body.hn .medrow,body.hn .ideacard{background:var(--card)}
body.dark .rowline{border-color:#1F2126}
body.dark .todorow{border-color:#1F2126}
body.dark .sym-item{border-color:#1F2126}
body.dark .mile{border-color:#1F2126}
body.dark .tbl .trow{border-color:#1F2126}
body.dark .hab h4{color:var(--ink)!important}
body.dark .pgh .rt{color:#A5B0BB}
body.dark .chip.off{background:#F2F4F7;color:#0B0C0E}
body.dark .sym-sev button.on.Severe{background:#F2F4F7;color:#0B0C0E}
body.dark svg [fill="#111111"]{fill:#E9EDF4}
body.dark svg [stroke="#111111"]{stroke:#E9EDF4}
body.dark svg [fill="#6F7987"]{fill:#A5B0BB}
body.dark svg [stroke="#E6E6E6"]{stroke:#2A2D33}
body.dark svg [fill="#1A3FA8"]{fill:#8FB0F5}
body.dark svg [stroke="#1A3FA8"]{stroke:#5E8BEE}
body.dark svg [fill="#39404A"]{fill:#9AA6B8}
body.dark svg [stroke="#39404A"]{stroke:#9AA6B8}
body.dark svg [fill="#6F7987"]{fill:#A5B0BB}
body.dark svg [stroke="#6F7987"]{stroke:#A5B0BB}
body.dark svg [stroke="#7189B4"]{stroke:#8FA6CC}
body.dark #mindsvg circle[fill="#fff"]{fill:#101114}
.menu-btn{position:relative}
.menu-btn.stale::after{content:'';position:absolute;top:8px;right:6px;width:8px;height:8px;border-radius:99px;background:#5E8BEE}
.menuinfo{padding:10px 16px;font-size:12px;color:var(--faint);border-top:1px solid var(--hair)}
.sec>h3{cursor:pointer;user-select:none;-webkit-user-select:none}
.sec>h3::after{content:'▾';float:right;color:var(--faint);font-size:11px;margin-left:8px;margin-top:8px}
.sec>div>h3{cursor:pointer;user-select:none;-webkit-user-select:none}
.sec.folded>h3::after{content:'▸'}
.sec.folded>*:not(:first-child){display:none}
.sec.folded{padding-bottom:2px}
.dcell{position:relative}
.ndot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:99px;background:var(--ambertx)}
.medrow{border:1px solid var(--hair);border-radius:10px;padding:10px 12px;margin-top:10px}
.mdpct{margin-left:auto;font-size:11px;color:var(--gray);white-space:nowrap}
.decade{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 2px;padding-bottom:5px;border-bottom:2px solid var(--ink)}
.decade b{font-size:14px}
.decade small{color:var(--faint);font-size:11px}
#tip{position:fixed;display:none;background:#111111;color:#fff;font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;z-index:80;pointer-events:none;max-width:230px;line-height:1.35}
body.dark #tip{background:#F2F4F7;color:#0B0C0E}
.fldlab{display:block;font-size:11px;color:var(--gray);margin:0 0 3px;border:none;background:transparent;padding:0;width:100%}
.reveal{animation:appfade .45s ease}
@keyframes appfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#printdoc{display:none}
@media print{body>*{display:none !important}#printdoc{display:block !important;color:#000}}
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(24px + env(safe-area-inset-bottom));background:#111111;color:#fff;padding:12px 18px;border-radius:10px;display:flex;gap:14px;align-items:center;font-size:14px;font-weight:600;z-index:70;opacity:0;pointer-events:none;transition:all .25s;max-width:88vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#toast button{color:#8FB0F5;font-weight:800;font-size:14px}
body.dark #toast{background:#F2F4F7;color:#0B0C0E}
body.dark #toast button{color:#2D64E3}
.srow{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #F0F2F4;width:100%;text-align:left}
body.dark .srow{border-color:#1F2126}
.srow i{width:10px;height:10px;border-radius:99px;margin-top:5px;flex:0 0 auto}
.srow .st{flex:1;font-size:14px}
.srow .st small{display:block;color:var(--faint);font-size:11.5px}
</style>
</head>

<script>
'use strict';
/* ============ tiny utils ============ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DIM=[31,28,31,30,31,30,31,31,30,31,30,31];
const peso=v=>v==null||isNaN(v)?'':'₱'+Math.round(v).toLocaleString('en-US');
const pesoK=v=>v==null?'':'₱'+Math.round(v/1000)+'k';
const pct=v=>Math.round(v*100)+'%';
const parseNum=s=>{const n=parseFloat(String(s).replace(/[₱,\s]/g,''));return isNaN(n)?null:n};
const MAXY=2070;
let todayD=new Date();
let NOWY=todayD.getFullYear(), NOWM=todayD.getMonth()+1, NOWDY=todayD.getDate();
function refreshDate(){
  const t=new Date();
  if(t.getFullYear()===NOWY&&t.getMonth()+1===NOWM&&t.getDate()===NOWDY)return;
  todayD=t;NOWY=t.getFullYear();NOWM=t.getMonth()+1;NOWDY=t.getDate();
  if(S.data)render();
}
setInterval(refreshDate,60000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')refreshDate()});
const daysIn=(y,m)=>m===2&&((y%4===0&&y%100!==0)||y%400===0)?29:DIM[m-1];
const median=a=>{const b=[...a].sort((x,y)=>x-y);if(!b.length)return 0;const m=Math.floor(b.length/2);return b.length%2?b[m]:(b[m-1]+b[m])/2};
const HUEMAP={violet:['#D9E2FB','#2D64E3'],teal:['#E1E4E8','#111111'],blue:['#C6D3F4','#1A3FA8'],green:['#DFE3E8','#6F7987'],rose:['#E2E8F4','#7189B4'],orange:['#D4D8DE','#39404A'],indigo:['#DCE7FE','#5E8BEE']};
const HUENAME={violet:'blue',teal:'ink',blue:'navy',green:'slate',rose:'steel',orange:'charcoal',indigo:'sky'};
const WORDS={mood:'great',sugar:'clean',coke:'clean',exercise:'strong'};
const STAGES={spark:'#B2B2B2',exploring:'#7189B4',building:'#5E8BEE',done:'#2D64E3'};
const TAGPAL=['#2D64E3','#1A3FA8','#5E8BEE','#111111','#57606A','#7189B4','#39404A','#8FB0F5','#23305B','#969696'];
function tagColor(t){const d=(S.data&&S.data.tagDefs||[]).find(x=>x.name===t);return d?d.color:'#6F7987'}
function byYearM(){const o={};for(const e of S.data.milestones)(o[e.year]=o[e.year]||[]).push(e);return o}
const SYMPTOMS=['Hallucinations','Paranoia','Confused thinking','Racing thoughts','Increased anxiety','Panic','Low mood','Irritability','Increased sleepiness','Trouble sleeping','Other'];
const CATS=['Loans','Rent','Allowances','Medicine','Stocks','Insurance','Savings','Bills'];
const TCATS=['Clothing','Footwear','Tech','Bags','Cards','Other'];
const DEFAULT_LABELS={
  home:{t:'Life exp',d:'Your life, in one quiet place.',c:'#2D64E3'},
  money:{t:'My money',d:'net worth and the plan',c:'#2D64E3'},
  daily:{t:'Daily spending',d:'how much, day by day',c:'#111111'},
  kurt:{t:"Kurt's year",d:'mood, sugar, exercise',c:'#5E8BEE',n:'Kurt'},
  jean:{t:"Jean's year",d:'mood first, always',c:'#7189B4',n:'Jean'},
  things:{t:'Things I own',d:'the minimalist guide',c:'#1A3FA8'},
  timeline:{t:'My timeline',d:'one square per year',c:'#39404A'},
  impact:{t:'My impact',d:'work that reached people',c:'#2456CF',m:'Disbursed'},
  mind:{t:'Mind',d:'to dos and the idea web',c:'#23305B'},
};
const LBLPAL=['#2D64E3','#1A3FA8','#5E8BEE','#7189B4','#111111','#39404A','#57606A','#8FB0F5','#23305B','#2456CF','#969696','#B2B2B2'];
const FONTS={
  soft:{n:'Basier',f:"'Basier Circle',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"},
  classic:{n:'Classic',f:"'Helvetica Neue',-apple-system,system-ui,sans-serif"},
  system:{n:'System',f:"-apple-system,system-ui,'Segoe UI',Roboto,sans-serif"},
};
function applyFont(k){document.body.style.fontFamily=(FONTS[k]||FONTS.soft).f}
const L=k=>(S.data&&S.data.labels&&S.data.labels[k])||DEFAULT_LABELS[k];
const secName=(id,def)=>esc((S.data&&S.data.secNames&&S.data.secNames[id])||def);
const SH=(id,def)=>`<h3 data-sec="${id}" data-def="${esc(def)}">${secName(id,def)}</h3>`;
const CH={green:'#2D64E3',green1:'#2D64E3',green3:'#1A3FA8',orange:'#C9CFD8',orange3:'#111111',red:'#111111',ink:'#111111',gray:'#6F7987',hair:'#E6E6E6',amber:'#2D64E3'};
function svgLine(pts,aria,fmt){
  const F=fmt||pesoK;
  if(pts.length<2)return '';
  const w=340,h=150,padL=10,padR=48,padT=16,padB=22,n=pts.length;
  const vs=pts.map(p=>p.v),mn=Math.min(...vs),mx=Math.max(...vs);
  const span=mx-mn||mx*0.1||1;
  const lo=mn-span*0.1, hi=mx+span*0.15;
  const X=i=>padL+(n===1?0:i/(n-1))*(w-padL-padR);
  const Y=v=>padT+(1-(v-lo)/(hi-lo))*(h-padT-padB);
  const path=pts.map((p,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(p.v).toFixed(1)).join(' ');
  const area=path+` L${X(n-1).toFixed(1)} ${h-padB} L${X(0).toFixed(1)} ${h-padB} Z`;
  const last=pts[n-1], first=pts[0];
  const step=Math.max(1,Math.ceil(n/8));
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" width="100%" role="img" aria-label="${esc(aria||'')}">
  <line x1="${padL}" y1="${h-padB}" x2="${w-padR+30}" y2="${h-padB}" stroke="${CH.hair}"/>
  <path d="${area}" fill="${CH.green1}" opacity=".26"/>
  <path d="${path}" fill="none" stroke="${CH.green}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  ${pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.2" fill="${CH.green3}"><title>${esc(p.lab)} ${peso(p.v)}</title></circle>`).join('')}
  <text x="${X(0).toFixed(1)}" y="${(Y(first.v)-8).toFixed(1)}" font-size="10" fill="${CH.gray}" text-anchor="start">${F(first.v)}</text>
  <text x="${(X(n-1)+8).toFixed(1)}" y="${(Y(last.v)+4).toFixed(1)}" font-size="11" font-weight="700" fill="${CH.ink}">${F(last.v)}</text>
  ${pts.map((p,i)=>(i%step===0||i===n-1)?`<text x="${X(i).toFixed(1)}" y="${h-7}" font-size="9" fill="${CH.gray}" text-anchor="middle">${esc(p.lab)}</text>`:'').join('')}
  </svg>`;
}
function colChart(vals,labels,opts){
  opts=opts||{};
  const w=340,h=150,padL=8,padR=8,padT=18,padB=20,n=vals.length;
  const mx=Math.max(...vals,opts.ref||0,1);
  const slot=(w-padL-padR)/n;
  const bw=Math.min(22,slot-5);
  const X=i=>padL+(i+0.5)*slot;
  const Y=v=>padT+(1-v/mx)*(h-padT-padB);
  const maxI=vals.indexOf(Math.max(...vals));
  let s=`<svg class="chart" viewBox="0 0 ${w} ${h}" width="100%" role="img" aria-label="${esc(opts.label||'')}">`;
  s+=`<line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="${CH.hair}"/>`;
  if(opts.ref>0){const ry=Y(opts.ref);s+=`<line x1="${padL}" y1="${ry.toFixed(1)}" x2="${w-padR}" y2="${ry.toFixed(1)}" stroke="${CH.gray}" stroke-dasharray="4 4" opacity=".5"/><text x="${w-padR}" y="${(ry-4).toFixed(1)}" font-size="9" fill="${CH.gray}" text-anchor="end">${esc(opts.refLabel||'')}</text>`}
  vals.forEach((v,i)=>{
    const x=X(i)-bw/2, y=Y(v), bh=Math.max(h-padB-y,v>0?2:0);
    s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${i===opts.cur?CH.amber:(opts.color||CH.orange)}"><title>${esc(labels[i])} ${peso(v)}</title></rect>`;
    if(v>0&&(i===maxI||i===opts.cur))s+=`<text x="${X(i).toFixed(1)}" y="${(y-5).toFixed(1)}" font-size="9.5" font-weight="700" fill="${CH.ink}" text-anchor="middle">${pesoK(v)}</text>`;
    s+=`<text x="${X(i).toFixed(1)}" y="${h-6}" font-size="9" fill="${CH.gray}" text-anchor="middle">${esc(labels[i])}</text>`;
  });
  return s+'</svg>';
}
function nwOf(y){const h=S.data.pnl.nwHist||(S.data.pnl.nwHist={});const k=String(y);return h[k]||(h[k]={})}
function dailyYears(){return [...new Set([...Object.keys(S.data.daily).map(Number),NOWY])].sort((a,b)=>a-b)}
function trkYears(who){const s=new Set([NOWY]);for(const g of Object.values(S.data[who].habits))for(const k of Object.keys(g))s.add(+k.split('-')[0]);return [...s].sort((a,b)=>a-b)}
function nwYears(){return [...new Set([...Object.keys(S.data.pnl.nwHist||{}).map(Number),NOWY])].sort((a,b)=>a-b)}
function yearChips(years,cur,act,extra){
  if(years.length<2)return '';
  return `<div class="mchips" style="padding-bottom:4px">${years.map(y2=>`<button class="${y2===cur?'on':''}" data-act="${act}" ${extra||''} data-y="${y2}">${y2}</button>`).join('')}</div>`;
}
function sparkNW(){
  const pts=nwSeries();

function habStreak(map){
  let cur=0;const t=new Date();
  if(map[`${t.getFullYear()}-${t.getMonth()+1}-${t.getDate()}`]==null)t.setDate(t.getDate()-1);
  while(map[`${t.getFullYear()}-${t.getMonth()+1}-${t.getDate()}`]!=null){cur++;t.setDate(t.getDate()-1)}
  const days=Object.keys(map).map(k=>{const p=k.split('-').map(Number);return Date.UTC(p[0],p[1]-1,p[2])}).sort((a,b)=>a-b);
  let best=0,run=0,prev=null;

/* ============ crypto + persistence ============ */
const enc=new TextEncoder(), dec=new TextDecoder();
const b64=b=>{const u=new Uint8Array(b);let s='';for(let i=0;i<u.length;i+=32768)s+=String.fromCharCode.apply(null,u.subarray(i,i+32768));return btoa(s)};
const unb64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pw,salt,iter){
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptData(obj,pw){
  const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12)), iter=310000;
  const key=await deriveKey(pw,salt,iter);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(JSON.stringify(obj)));
  return {salt:b64(salt),iv:b64(iv),ct:b64(ct),iter};
}
async function decryptBlob(blob,pw){
  const key=await deriveKey(pw,unb64(blob.salt),blob.iter||310000);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(blob.iv)},key,unb64(blob.ct));
  return JSON.parse(dec.decode(pt));
}

function vTimeline(){
  const by=byYearM();
  const grid=[];
  for(let dec=1990;dec<=MAXY;dec+=10){
    for(let g=0;g<10;g++){
      const y=dec+g;
      if(y<1992||y>MAXY){grid.push(`<span class="tcell" style="background:transparent"></span>`);continue}
      const es=by[y]||[];
      let cls='tcell',st='';
      if(es.length){cls+=' story';st=`background:${tagColor(es[0].type)}`}
      else if(y===NOWY)cls+=' now';
      else if(y<NOWY)cls+=' lived';
      grid.push(`<button class="${cls}" style="${st}" data-act="tmlgrid" data-y="${y}">${String(y).slice(2)}</button>`);
    }
  }
  const rows=[];
  for(let y=1992;y<=MAXY;y++){
    const es=by[y]||[];
    if((y-1992)%10===0){
      const dEnd=Math.min(y+9,MAXY);
      const es10=S.data.milestones.filter(e2=>e2.year>=y&&e2.year<=dEnd);
      if(es10.length||y<=NOWY+3){
        const label=y-1992===0?'The first years':y-1992===10?'Your teens':`Your ${y-1992}s`;
        let dom='';
        if(es10.length){const cnt={};es10.forEach(e2=>{if(e2.type)cnt[e2.type]=(cnt[e2.type]||0)+1});const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];if(top)dom=' · mostly '+top[0]}
        rows.push(`<div class="decade"><b>${label}</b><small>${es10.length?es10.length+' moment'+(es10.length>1?'s':'')+esc(dom):'still unwritten'}</small></div>`);
      }
    }
    if(!es.length&&y>NOWY+3)continue;
    if(!es.length){rows.push(`<button class="mile" data-act="tmladd" data-y="${y}"><span class="yr" style="${y===NOWY?'color:var(--ambertx)':''}">${y}</span><span class="ev"><span style="color:var(--faint)">still quiet, tap to write</span><small>age ${y-1992}</small></span></button>`);continue}
    es.forEach((e,j)=>{const gi=S.data.milestones.indexOf(e);const c=tagColor(e.type);
      rows.push(`<button class="mile" data-act="tmledit" data-i="${gi}"><span class="yr" style="${y===NOWY?'color:var(--ambertx)':''}">${j===0?y:''}</span><span class="ev">${esc(e.event)}<small>${e.mo?MON[e.mo-1]+(e.d?' '+e.d:'')+' · ':''}age ${y-1992}${e.type?` · <span class="chip" style="background:${c}1c;color:${c};font-size:11px">${esc(e.type)}</span>`:''}</small></span>${e.photo?`<img src="${e.photo}" alt="" style="width:44px;height:44px;object-fit:cover;border-radius:9px;flex:0 0 auto">`:''}</button>`)});
    rows.push(`<button class="mile" style="border-bottom:none;padding:2px 0 12px" data-act="tmladd" data-y="${y}"><span class="yr"></span><span class="ev" style="color:var(--faint);font-size:13px">add another moment in ${y}</span></button>`);
  }
  return hdr(L('timeline').t)+`
  <div class="sec"><div style="display:flex;align-items:center"><h3 style="flex:1;border:none;margin:0;padding:0" data-sec="tl1" data-def="Life at a glance">${secName('tl1','Life at a glance')}</h3><button class="editlbl" data-act="tagedit">edit tags</button></div>
    <div class="tgrid">${grid.join('')}</div>
    <div class="legend">${S.data.tagDefs.map(t=>`<span><i style="background:${t.color}"></i>${esc(t.name)}</span>`).join('')}
      <span><i style="background:var(--g0)"></i>lived</span><span><i style="background:var(--amber)"></i>this year</span></div>
  </div>
  <div class="sec">${SH('tl2','Year by year')}${rows.join('')}</div>`;
}

function mindGraph(){
  const ideas=S.data.mind.ideas;
  if(!ideas.length)return '<div class="note">Add an idea below and the web starts to grow.</div>';
  const key=s=>s.trim().toLowerCase();
  const nodes=ideas.map(i2=>({id:i2.id,label:i2.title,real:1,st:i2.stage||'spark'}));
  const byT={};nodes.forEach(n=>byT[key(n.label)]=n);
  const ph={};const edges=[];
  for(const i2 of ideas)for(const nm of linksOf(i2.body)){
    const k2=key(nm);let t2=byT[k2]||ph[k2];
    if(!t2)t2=ph[k2]={id:'ph~'+k2,label:nm,real:0};
    if(t2.id!==i2.id)edges.push([i2.id,t2.id]);
  }
  {const seen=new Set();const E2=[];for(const [a2,b2] of edges){const k2=a2<b2?a2+'|'+b2:b2+'|'+a2;if(!seen.has(k2)){seen.add(k2);E2.push([a2,b2])}}edges.length=0;edges.push(...E2)}
  const all=[...nodes,...Object.values(ph)];
  const N=all.length,W=340,H=Math.max(210,Math.min(380,90+N*22));
  const saved=S.data.mind.pos||{};
  all.forEach((n,i2)=>{const p2=saved[n.id];const a=2*Math.PI*i2/N-Math.PI/2;
    n.x=p2?p2.x:W/2+Math.cos(a)*(W*0.30);n.y=p2?p2.y:H/2+Math.sin(a)*(H*0.32);n.pin=!!p2});
  const idx={};all.forEach(n=>idx[n.id]=n);
  const deg={};edges.forEach(([s2,t2])=>{deg[s2]=(deg[s2]||0)+1;deg[t2]=(deg[t2]||0)+1});
  for(let it=0;it<30;it++){
    for(const n of all){n.fx=0;n.fy=0}
    for(let a2=0;a2<N;a2++)for(let b2=a2+1;b2<N;b2++){const p2=all[a2],q2=all[b2];let dx=p2.x-q2.x,dy=p2.y-q2.y;let d=Math.hypot(dx,dy)||0.01;const f=1400/(d*d);dx/=d;dy/=d;p2.fx+=dx*f;p2.fy+=dy*f;q2.fx-=dx*f;q2.fy-=dy*f}
    for(const [s2,t2] of edges){const p2=idx[s2],q2=idx[t2];let dx=q2.x-p2.x,dy=q2.y-p2.y;let d=Math.hypot(dx,dy)||0.01;const f=(d-80)*0.02;dx/=d;dy/=d;p2.fx+=dx*f;p2.fy+=dy*f;q2.fx-=dx*f;q2.fy-=dy*f}
    for(const n of all){if(n.pin)continue;n.fx+=(W/2-n.x)*0.012;n.fy+=(H/2-n.y)*0.012;n.x=Math.max(26,Math.min(W-26,n.x+n.fx));n.y=Math.max(22,Math.min(H-28,n.y+n.fy))}
  }
  all.forEach(n=>{n.vx=0;n.vy=0});
  GSIM={nodes:all,edges,idx,W,H,grab:null,calm:0};
  const col=L('mind').c||'#23305B';
  return `<svg id="mindsvg" class="chart" viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="The idea web">
  ${edges.map(([s2,t2])=>{const p2=idx[s2],q2=idx[t2];return `<line data-a="${s2}" data-b="${t2}" x1="${p2.x.toFixed(1)}" y1="${p2.y.toFixed(1)}" x2="${q2.x.toFixed(1)}" y2="${q2.y.toFixed(1)}" stroke="#E6E6E6" stroke-width="1.3"/>`}).join('')}
  ${all.map(n=>{const r=6+Math.min(deg[n.id]||0,4)*1.6;
    return `<g data-node="${n.id}" data-r="${r.toFixed(1)}" data-act="${n.real?'ideaedit':'ideago'}" ${n.real?`data-id="${n.id}"`:`data-name="${esc(n.label)}"`} style="cursor:grab;touch-action:none">
    <circle cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${r.toFixed(1)}" fill="${n.real?(STAGES[n.st]||col):'#fff'}" stroke="${n.real?(STAGES[n.st]||col):'#B2B2B2'}" ${n.real?'':'stroke-dasharray="3 3"'} stroke-width="1.5"/>
    <text x="${n.x.toFixed(1)}" y="${(n.y+r+11).toFixed(1)}" font-size="9.5" fill="#6F7987" text-anchor="middle">${esc(n.label.length>16?n.label.slice(0,15)+'…':n.label)}</text></g>`}).join('')}
  </svg>`;
}

document.addEventListener('keydown',e=>{
  if(!S.data)return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const tg=(e.target&&e.target.tagName)||'';
  if(tg==='INPUT'||tg==='TEXTAREA'||tg==='SELECT'||(e.target&&e.target.isContentEditable))return;
  if(e.key==='Escape'){if(S.drawer){S.drawer=null;render()}else if(S.menu){S.menu=false;render()}return}
  if(S.drawer)return;
  if(e.key==='/'){e.preventDefault();S.view='search';S.menu=false;render();setTimeout(()=>$('#searchbox')&&$('#searchbox').focus(),50)}
  else if(e.key==='h'||e.key==='H'){S.view='home';S.menu=false;window.scrollTo(0,0);render()}

function applyLockIcon(){

  let li=localStorage.getItem('lifeexp.icon');

  if(li){img.src=li;img.style.display='block'}
  else{img.removeAttribute('src');img.style.display='none'}
  document.querySelectorAll('link[rel="icon"],link[rel="apple-touch-icon"]').forEach(lk=>{
    if(!lk.dataset.orig)lk.dataset.orig=lk.href;
    lk.href=li||lk.dataset.orig;

}

function stepPhysics(g){
  const N=g.nodes.length;
  for(const n of g.nodes){n.fx=0;n.fy=0}
  for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){const p2=g.nodes[i],q2=g.nodes[j];let dx=p2.x-q2.x,dy=p2.y-q2.y;let d=Math.hypot(dx,dy)||0.01;const f=1400/(d*d);dx/=d;dy/=d;p2.fx+=dx*f;p2.fy+=dy*f;q2.fx-=dx*f;q2.fy-=dy*f}

    central.push([0x50,0x4B,1,2,...le16(20),...le16(20),...le16(0x0800),...le16(0),...le16(0),...le16(0x5321),
      ...le32(crc),...le32(data.length),...le32(data.length),...le16(nb.length),...le16(0),...le16(0),
      ...le16(0),...le16(0),...le32(0),...le32(off),...nb]);
    off+=head.length+nb.length+data.length;
  }
  const cdStart=off;let cdLen=0;
  for(const c of central){chunks.push(new Uint8Array(c));cdLen+=c.length}
  chunks.push(new Uint8Array([0x50,0x4B,5,6,0,0,0,0,...le16(files.length),...le16(files.length),...le32(cdLen),...le32(cdStart),0,0]));

}
